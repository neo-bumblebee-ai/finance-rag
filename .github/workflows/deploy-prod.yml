name: Deploy → Production

on:
  push:
    branches: [main]

jobs:
  # CI must pass before prod deploy
  test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ eval/ tests/

      - name: Unit tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Render (prod)
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: ${{ vars.RENDER_PROD_URL }}

    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD }}" \
            -H "Content-Type: application/json"

      - name: Wait for deployment
        run: |
          echo "Production deployment triggered."
          echo "Prod URL: ${{ vars.RENDER_PROD_URL }}"

      - name: Health check
        run: |
          sleep 90
          curl --fail --retry 5 --retry-delay 20 \
            "${{ vars.RENDER_PROD_URL }}/health" | jq .
